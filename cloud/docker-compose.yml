services:
  vigipro_cloud:
    build: .
    image: vigipro_cloud:latest
    container_name: vigipro_cloud
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST:-vigipro.mahina.cloud}
      - PHX_SERVER=true
      - PORT=4000
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - EPHEMERAL_TOKEN_SECRET=${EPHEMERAL_TOKEN_SECRET}
    volumes:
      - hls_data:/tmp/vigipro_hls
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  hls_data:
